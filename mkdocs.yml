
# =============================================================
# Gestão e Modelos de Negócios
# Gerado automaticamente — NÃO EDITE MANUALMENTE
# Edite course.yml e execute: python sync_repos.py --generate .
# =============================================================

site_name: "Gestão e Modelos de Negócios"
site_url: "https://ricardotecpro.github.io/adm_gestao_dmn/"
site_author: "ricardotecpro"
site_description: "Curso completo de Gestão e Modelos de Negócios para Análise e Desenvolvimento de Sistemas"
repo_name: "ricardotecpro/adm_gestao_dmn"
repo_url: "https://github.com/ricardotecpro/adm_gestao_dmn"

exclude_docs: |
  quizzes/src/*
  slides/src/*
  slides/slide-*.md
  **/.src/*

theme:
  name: material
  custom_dir: overrides
  language: pt-BR
  logo: assets/images/logo_gestao.svg
  favicon: assets/images/logo_gestao.svg
  palette:
    - scheme: default
      primary: "teal"
      accent: "amber"
      toggle:
        icon: material/weather-night
        name: Modo Escuro
    - scheme: slate
      primary: "teal"
      accent: "amber"
      toggle:
        icon: material/weather-sunny
        name: Modo Claro
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.tabs.link
    - content.code.annotation
    - content.code.copy
    - content.code.select
    - content.tooltips
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.mark
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.tilde
  - pymdownx.smartsymbols
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.arithmatex:
      generic: true
  - admonition
  - footnotes
  - attr_list
  - md_in_html
  - tables
  - def_list
  - toc:
      permalink: true
      toc_depth: 3

plugins:
  - search:
      lang: pt
  - social:
      cards: false
  - tags
  - awesome-pages
  - mkdocs-revealjs
  - mkdocs-jupyter
  - glightbox
  - mkdocs_quiz
  - git-authors:
      show_contribution: true
      show_line_count: true
      count_empty_lines: false
      fallback_to_empty: false
      sort_authors_by: contribution
      authorship_threshold_percent: 10
      exclude:
        - index.md
  - git-revision-date-localized:
      enable_creation_date: true
      type: datetime
  - macros
  - mkdocs-video
  - termynal:
      title: shell
      buttons: macos
      prompt_literal_start:
        - "$"
  - rss:
      match_path: .*
      date_from_meta:
        datetime_format: '%Y-%m-%d %H:%M:%S'
  - minify:
      minify_html: true
      minify_js: true
      minify_css: true
  - print-site:
      add_to_navigation: false
      print_page_title: "Versão para Impressão"
      add_print_site_banner: false
      enumerate_headings: false
      enumerate_figures: false

hooks:
  - hooks/copy_slides.py

extra_css:
  - assets/css/quiz.css
  - assets/css/home.css
  - assets/css/extra.css
  - https://cdn.jsdelivr.net/npm/termynal/termynal.css
  - assets/css/reveal-custom.css

extra_javascript:
  - assets/js/quiz.js
  - assets/js/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
  - https://unpkg.com/mermaid@11.12.3/dist/mermaid.min.js
  - assets/js/mermaid-init.js
  - assets/js/custom_termynal.js
  - https://cdn.jsdelivr.net/npm/termynal/termynal.min.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: "https://github.com/ricardotecpro"
    - icon: fontawesome/brands/linkedin
      link: "https://linkedin.com/in/ricardotecpro"
