
# =============================================================
# Gestão e Modelos de Negócios
# Gerado automaticamente — NÃO EDITE MANUALMENTE
# Edite course.yml e execute: python sync_repos.py --generate .
# =============================================================

site_name: "Gestão e Modelos de Negócios"
site_url: "https://ricardotecpro.github.io/adm_gestao_dmn/"
site_author: "ricardotecpro"
site_description: "Curso completo de Gestão e Modelos de Negócios para Análise e Desenvolvimento de Sistemas"
repo_name: "ricardotecpro/adm_gestao_dmn"
repo_url: "https://github.com/ricardotecpro/adm_gestao_dmn"

theme:
  name: material
  custom_dir: overrides
  language: pt-BR
  logo: assets/images/logo_gestao.svg
  favicon: assets/images/logo_gestao.svg
  palette:
    - scheme: default
      primary: "teal"
      accent: "amber"
      toggle:
        icon: material/weather-night
        name: Modo Escuro
    - scheme: slate
      primary: "teal"
      accent: "amber"
      toggle:
        icon: material/weather-sunny
        name: Modo Claro
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.tabs.link
    - content.code.annotation
    - content.code.copy
    - content.code.select
    - content.tooltips
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.mark
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.tilde
  - pymdownx.smartsymbols
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.arithmatex:
      generic: true
  - admonition
  - footnotes
  - attr_list
  - md_in_html
  - tables
  - def_list
  - toc:
      permalink: true
      toc_depth: 3

plugins:
  - search:
      lang: pt
  - social
  - tags
  - awesome-pages
  - revealjs:
      theme: white
      transition: slide
      slide_number: true
      controls: true
      progress: true
  - mkdocs-jupyter:
      include_source: true
  - glightbox:
      touchNavigation: true
      loop: false
      effect: zoom
      width: 100%
      height: auto
      zoomable: true
      draggable: true
  - quiz
  - git-authors
  - git-revision-date-localized:
      type: timeago
      enable_creation_date: true
      locale: pt
  - macros
  - mkdocs-video:
      is_video: true
      video_type: mp4
      video_autoplay: false
      css_style:
        width: "100%"
  - termynal:
      prompt_literal_start:
        - "$"
        - ">>>"
  - rss:
      match_path: "aulas/.*"
      date_from_meta:
        as_creation: date.created
        as_update: date.updated
  - minify:
      minify_html: true
  - print-site:
      add_to_navigation: true
      print_page_title: "Versão para Impressão"

hooks:
  - hooks/copy_slides.py

extra_css:
  - assets/css/extra.css
  - assets/css/home.css
  - assets/css/quiz.css
  - assets/css/reveal-custom.css

extra_javascript:
  - assets/js/quiz.js
  - assets/js/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
  - https://unpkg.com/mermaid@11.12.3/dist/mermaid.min.js
  - assets/js/mermaid-init.js
  - assets/js/custom_termynal.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: "https://github.com/ricardotecpro"
    - icon: fontawesome/brands/linkedin
      link: "https://linkedin.com/in/ricardotecpro"
